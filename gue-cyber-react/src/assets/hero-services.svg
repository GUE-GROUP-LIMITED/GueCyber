<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Abstract network of nodes with shield to represent services">
  <defs>
    <linearGradient id="g1" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0b2b5f"/>
      <stop offset="100%" stop-color="#0b3b66"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1976d2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#43a047" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)" />
  <!-- Soft halo -->
  <circle cx="220" cy="160" r="120" fill="url(#g2)" opacity="0.06" />
  <circle cx="980" cy="420" r="140" fill="url(#g2)" opacity="0.05" />

  <!-- network nodes -->
  <g fill="#90caf9" opacity="0.95">
    <circle cx="300" cy="260" r="6" />
    <circle cx="370" cy="200" r="6" />
    <circle cx="450" cy="260" r="6" />
    <circle cx="540" cy="210" r="6" />
    <circle cx="720" cy="260" r="6" />
    <circle cx="840" cy="220" r="6" />
    <circle cx="920" cy="280" r="6" />
  </g>

  <!-- connecting lines -->
  <g stroke="#90caf9" stroke-opacity="0.6" stroke-width="1.6" fill="none">
    <path d="M300 260 L370 200 L450 260 L540 210" />
    <path d="M540 210 L720 260 L840 220 L920 280" />
  </g>

  <!-- shield motif center-right -->
  <g transform="translate(760,120)">
    <path d="M60 0 L120 40 V110 C120 160 60 180 60 180 C60 180 0 160 0 110 V40 Z" fill="#0b2b5f" opacity="0.98"/>
    <path d="M60 12 L108 42 V102 C108 144 60 160 60 160 C60 160 12 144 12 102 V42 Z" fill="#43a047" opacity="0.9"/>
    <circle cx="60" cy="78" r="8" fill="#fff" opacity="0.95"/>
  </g>

  <!-- subtle watermark text (decorative) -->
  <text x="60" y="560" font-family="Inter, Arial" font-size="18" fill="#3e6a9b" opacity="0.06">GUE Cyber • Services</text>
</svg>
